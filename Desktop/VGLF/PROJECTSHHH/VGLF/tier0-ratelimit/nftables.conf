#!/usr/sbin/nft -f
# VGLF Tier 0b — nftables baseline for municipal OT/ICS networks
# Load with: sudo nft -f tier0-ratelimit/nftables.conf
# Verify with: sudo nft list ruleset
#
# INVARIANT: IPv6 rules mirror every IPv4 rule exactly (CLAUDE.md §8).
# INVARIANT: Sacrosanct IPs are in the allow sets and cannot be removed by Cortex.
#
# Architecture:
#   blocklist4 / blocklist6  — dynamic sets populated by Cortex IPC (with timeout)
#   allowlist4 / allowlist6  — static sets for sacrosanct IPs (SCADA, mgmt, loopback)
#   vglf_input chain         — main filter hook
#   vglf_ratelimit chain     — connection-rate gates before deep inspection

flush ruleset

table inet vglf {

    # ── Dynamic blocklists (populated by Cortex via IPC) ─────────────────
    # Elements time out automatically — Cortex does not need to manage removal.

    set blocklist4 {
        type ipv4_addr
        flags dynamic, interval, timeout
        timeout 1h
        gc-interval 5m
        comment "IPv4 addresses blocked by Cortex analysis"
    }

    set blocklist6 {
        type ipv6_addr
        flags dynamic, interval, timeout
        timeout 1h
        gc-interval 5m
        comment "IPv6 addresses blocked by Cortex analysis"
    }

    # ── Static allowlists (sacrosanct — populated from sacrosanct.toml) ──
    # POPULATE THESE WITH REAL ADDRESSES BEFORE PRODUCTION DEPLOYMENT.
    # These take precedence over the blocklists at evaluation time.

    set allowlist4 {
        type ipv4_addr
        flags interval
        elements = {
            127.0.0.0/8,        # loopback
            # SCADA/PLC/HMI — ADD REAL ADDRESSES HERE
            # 10.0.1.1/32,      # SCADA gateway
            # 10.0.1.2/32,      # Primary PLC
            # 10.0.2.0/24,      # Management VLAN
        }
        comment "IPv4 sacrosanct networks — cannot be blocked"
    }

    set allowlist6 {
        type ipv6_addr
        flags interval
        elements = {
            ::1/128,            # loopback
            # ADD REAL IPv6 ADDRESSES FOR SCADA/MGMT NETWORKS HERE
        }
        comment "IPv6 sacrosanct networks — cannot be blocked"
    }

    # ── Rate-limit tracking maps ──────────────────────────────────────────

    map ratelimit4 {
        type ipv4_addr : verdict
        flags dynamic
        comment "Per-source IPv4 connection rate tracking"
    }

    map ratelimit6 {
        type ipv6_addr : verdict
        flags dynamic
        comment "Per-source IPv6 connection rate tracking"
    }

    # ── Main input chain ──────────────────────────────────────────────────

    chain vglf_input {
        type filter hook input priority filter; policy accept;

        # 1. Allow established/related — never inspect ongoing sessions.
        ct state established,related accept

        # 2. Allow loopback unconditionally.
        iif lo accept

        # 3. Allow sacrosanct IPs — evaluated BEFORE blocklist.
        #    This is the belt-and-suspenders layer; Rust IPC also enforces this.
        ip  saddr @allowlist4 accept
        ip6 saddr @allowlist6 accept

        # 4. Drop blocklisted IPs — silently (no RST, no ICMP unreachable).
        #    Silence denies attackers confirmation of block status.
        ip  saddr @blocklist4 drop
        ip6 saddr @blocklist6 drop

        # 5. Jump to rate-limit chain for new connections.
        ct state new jump vglf_ratelimit
    }

    # ── Rate-limit chain ──────────────────────────────────────────────────

    chain vglf_ratelimit {
        # TCP SYN flood mitigation: max 60 new TCP connections/second per source.
        # Threshold tuned for OT networks where legitimate burst is minimal.
        ip  saddr limit rate over 60/second burst 20 packets \
            counter drop comment "IPv4 TCP new-conn rate limit"
        ip6 saddr limit rate over 60/second burst 20 packets \
            counter drop comment "IPv6 TCP new-conn rate limit"

        # UDP flood mitigation: max 200 UDP packets/second per source.
        udp ip  saddr limit rate over 200/second burst 50 packets \
            counter drop comment "IPv4 UDP rate limit"
        udp ip6 saddr limit rate over 200/second burst 50 packets \
            counter drop comment "IPv6 UDP rate limit"

        # ICMP rate limit — allow diagnostic but not ICMP flood.
        icmp   limit rate over 10/second burst 5 packets \
            counter drop comment "ICMPv4 rate limit"
        icmpv6 limit rate over 10/second burst 5 packets \
            counter drop comment "ICMPv6 rate limit"

        # Fragment drop — OT networks should not use fragmentation.
        # Fragmented packets are a common evasion technique.
        ip  frag-off & 0x1fff != 0 counter drop \
            comment "IPv4 fragment drop"
        # IPv6 fragments via extension header — drop them.
        exthdr frag exists counter drop \
            comment "IPv6 fragment extension header drop"
    }

    # ── Output chain — default accept, log anomalies ──────────────────────

    chain vglf_output {
        type filter hook output priority filter; policy accept;
        # No outbound blocking — VGLF is an inbound threat detection system.
    }

    # ── Forward chain — default drop for OT networks ─────────────────────

    chain vglf_forward {
        type filter hook forward priority filter; policy drop;
        # OT/ICS networks should not route arbitrary traffic.
        # Add explicit forward rules here for known-legitimate paths only.
        ct state established,related accept
        comment "Default-drop forward — add explicit rules for OT routing"
    }
}
